<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>캠퍼스의 새들</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* 스크롤 방지 */
            background-color: #f0f0f0; /* 이미지 로딩 전 기본 배경색 */
        }

        /* [3번] 지도 뒤에 배경 이미지 넣기 */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 아래 URL 부분에 넣고 싶은 이미지 주소를 넣으세요 */
            background-image: url('https://images.unsplash.com/photo-1444464666168-49d633b86747?q=80&w=2069&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            z-index: 1; /* 가장 뒤에 배치 */
        }

        /* [1번 & 2번] 박스 없이 중앙에 제목 배치 */
        #title-container {
            position: absolute;
            top: 50%;         /* 세로 중앙 */
            left: 50%;        /* 가로 중앙 */
            transform: translate(-50%, -50%); /* 정확한 중앙 정렬 */
            text-align: center;
            z-index: 100;     /* 지도와 이미지보다 위에 배치 */
            pointer-events: none; /* 제목 뒤의 지도를 클릭할 수 있게 함 */
            width: 100%;
        }

        #main-title {
            margin: 0;
            font-size: 60px; /* 제목 크기 (원하는 대로 조절) */
            color: white;    /* 글자색 (흰색이 배경에서 잘 보입니다) */
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* 글자 가독성을 위한 그림자 */
            letter-spacing: -1px;
        }

        #sub-title {
            margin: 15px 0 0 0;
            font-size: 24px;
            color: #eeeeee;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* 지도가 그려질 영역 */
        #map {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; /* 이미지보다는 위, 제목보다는 아래 */
            opacity: 0.8; /* 지도를 약간 투명하게 해서 뒤의 이미지가 비치게 함 (필요 없으면 1로 변경) */
        }
    </style>
</head>
<body>

    <!-- 지도 뒤 배경 이미지 -->
    <div id="bg-image"></div>

    <!-- 중앙 제목 -->
    <div id="title-container">
        <h1 id="main-title">캠퍼스의 새들</h1>
        <p id="sub-title">조류를 통해 자연을 만나다</p>
    </div>

    <!-- 카카오맵 -->
    <div id="map"></div>

    <!-- 카카오맵 API (본인의 JavaScript 키를 넣으세요) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4943ba2fc6952cf2d1e6afe9d646d32d"></script>
    
    <script>
        var mapContainer = document.getElementById('map'), 
            mapOption = { 
                center: new kakao.maps.LatLng(37.2396, 127.0815), // 경희대 국제캠 중심
                level: 3 
            };

        var map = new kakao.maps.Map(mapContainer, mapOption); 
    </script>
</body>
</html>
