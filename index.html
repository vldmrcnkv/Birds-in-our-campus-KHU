<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캠퍼스의 새들</title>
    <style>
        /* 전체 페이지 기본 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            text-align: center; /* 가운데 정렬 */
            background-color: #fafafa;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 제목 영역 스타일 */
        .title-area {
            margin-bottom: 30px;
        }

        .title-area h1 {
            font-size: 36px;
            color: #2c3e50;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .title-area h2 {
            font-size: 22px;
            color: #555;
            font-weight: normal;
            margin: 0;
        }

        /* 스케치의 초록색 네모칸 스타일 구현 */
        .map-box {
            border: 4px solid #6b8e23; /* 스케치와 비슷한 톤의 초록색 테두리 */
            border-radius: 4px; /* 모서리를 살짝 둥글게 */
            width: 90%;
            max-width: 900px;
            height: 600px; /* 네모칸의 높이 */
            background-color: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            overflow: hidden; /* 지도가 네모칸 밖으로 삐져나가지 않게 처리 */
        }

        /* 지도 iframe 스타일 */
        .map-box iframe {
            width: 100%;
            height: 100%;
            border: none; /* iframe 기본 테두리 제거 */
        }
    </style>
</head>
<body>

    <!-- 상단 제목 영역 -->
    <div class="title-area">
        <h1>캠퍼스의 새들</h1>
        <h2>조류를 통해 자연을 만나다</h2>
    </div>

    <!-- 지도가 들어갈 초록색 네모칸 -->
    <div class="map-box">
        <!-- 별도의 가입이나 API 키 없이 바로 쓸 수 있는 오픈스트리트맵(OpenStreetMap)을 예시로 넣었습니다. -->
        <iframe 
            src="https://www.openstreetmap.org/export/embed.html?bbox=126.96%2C37.55%2C127.01%2C37.60&amp;layer=mapnik" 
            title="캠퍼스 지도">
        </iframe>
    </div>

</body>
</html>
