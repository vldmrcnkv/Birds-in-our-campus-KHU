<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>캠퍼스의 새들</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* 스크롤 방지 */
            background-color: #f0f0f0; /* 이미지 로딩 전 기본 배경색 */
        }

        /* [3번] 지도 뒤에 배경 이미지 넣기 */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 아래 URL 부분에 넣고 싶은 이미지 주소를 넣으세요 */
            background-image: url('https://github.com/vldmrcnkv/Birds-in-our-campus-KHU/blob/main/olivebackground.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1; /* 가장 뒤에 배치 */
        }

        /* [1번 & 2번] 박스 없이 중앙에 제목 배치 */
        #title-container {
            position: absolute;
            top: 50%;         /* 세로 중앙 */
            left: 50%;        /* 가로 중앙 */
            transform: translate(-50%, -50%); /* 정확한 중앙 정렬 */
            text-align: center;
            z-index: 100;     /* 지도와 이미지보다 위에 배치 */
            pointer-events: none; /* 제목 뒤의 지도를 클릭할 수 있게 함 */
            width: 100%;
        }

        #main-title {
            margin: 0;
            font-size: 60px; /* 제목 크기 (원하는 대로 조절) */
            color: white;    /* 글자색 (흰색이 배경에서 잘 보입니다) */
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* 글자 가독성을 위한 그림자 */
            letter-spacing: -1px;
        }

        #sub-title {
            margin: 15px 0 0 0;
            font-size: 24px;
            color: #eeeeee;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* 지도가 그려질 영역 */
   <!-- 지도를 감싸는 박스 -->
<div class="map-box">
    <h3>긴꼬리딱새조의 탐조 지도</h3> <!-- 제목도 넣을 수 있어요 -->
    <div id="map"></div> <!-- 실제 지도가 그려지는 곳 -->
</div>
        /* 지도를 감싸는 흰색 박스 스타일 */
.map-box {
    width: 90%;            /* 화면 너비의 90% 사용 */
    max-width: 800px;      /* 너무 커지지 않게 최대 폭 제한 */
    margin: 20px auto;     /* 가운데 정렬 */
    padding: 15px;         /* 박스 내부 여백 */
    background: #ffffff;   /* 박스 배경색 */
    border: 1px solid #ddd; /* 연한 테두리 */
    border-radius: 12px;   /* 모서리를 둥글게 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* 은은한 그림자 효과 */
}

/* 실제 지도 영역 */
#map {
    width: 100%;           /* 박스 너비에 맞춤 */
    height: 400px;         /* 지도의 높이 설정 */
    border-radius: 8px;    /* 지도 자체 모서리도 살짝 둥글게 */
}
    </style>
</head>
<body>

    <!-- 지도 뒤 배경 이미지 -->
    <div id="bg-image"></div>

    <!-- 중앙 제목 -->
    <div id="title-container">
        <h1 id="main-title">캠퍼스의 새들</h1>
        <p id="sub-title">조류를 통해 자연을 만나다</p>
    </div>

    <!-- 카카오맵 -->
    <div id="map"></div>

    <!-- 카카오맵 API (본인의 JavaScript 키를 넣으세요) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4943ba2fc6952cf2d1e6afe9d646d32d"></script>
    
    <script>
        var mapContainer = document.getElementById('map'), 
            mapOption = { 
                center: new kakao.maps.LatLng(37.597235, 127.051730), // 경희대 서울캠퍼스 본관 중심
                level: 3 
            };

        var map = new kakao.maps.Map(mapContainer, mapOption); 
    </script>
</body>
</html>
