<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캠퍼스의 새들</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #fafafa;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 메인 지도 박스 (화면 가장자리 1/18 여백) */
        .map-box {
            position: relative;
            width: calc(100% - (100% / 9));
            height: calc(100vh - (100vh / 9));
            border: 4px solid #6b8e23;
            border-radius: 20px;
            background-color: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        #map { width: 100%; height: 100%; border-radius: 16px; }

        /* 제목 박스 (반투명 회색, 테두리에 걸침) */
        .title-area {
            position: absolute;
            top: -30px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(180, 180, 180, 0.9); 
            padding: 8px 40px;
            z-index: 10;
            text-align: center;
            border: 1px solid #999;
            white-space: nowrap;
        }

        .title-area h1 { font-size: 22px; color: #333; margin: 0; }
        .title-area h2 { font-size: 13px; color: #555; margin: 5px 0 0 0; font-weight: normal; }

        /* [핵심] 오른쪽 아래 긴꼬리딱새 이미지 버튼 */
        .bird-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px; /* 이미지 크기 */
            height: 100px;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.3s ease;
        }

        .bird-button:hover { transform: scale(1.1); } /* 마우스 올리면 커짐 */
        
        .bird-button img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            /* 이미지 배경이 투명이 아닐 경우를 대비해 약간의 그림자 추가 */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        /* 팝업창 디자인 */
        #name-popup {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 100;
            text-align: center;
            min-width: 260px;
            border: 2px solid #6b8e23;
        }

        .team-name { color: #6b8e23; font-weight: bold; font-size: 1.4em; margin-bottom: 12px; }
        .member-names { color: #444; font-size: 1em; margin: 0; line-height: 1.6; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; color: #999; font-size: 20px; }
    </style>
</head>
<body>

    <div class="map-box">
        <!-- 제목 영역 -->
        <div class="title-area">
            <h1>캠퍼스의 새들</h1>
            <h2>조류를 통해 자연을 만나다</h2>
        </div>

        <!-- 지도 영역 -->
        <div id="map"></div>

        <!-- 긴꼬리딱새 이미지 버튼 (클릭 시 팝업 실행) -->
        <div class="bird-button" onclick="showNamePopup()">
            <!-- 깃허브 Raw 이미지 주소로 수정했습니다 -->
            <img src="https://raw.githubusercontent.com/vldmrcnkv/Birds-in-our-campus-KHU/main/%EA%B8%B4%EA%BC%AC%EB%A6%AC%EB%94%B1%EC%83%88%EC%9D%98%20%EA%B7%B8%EB%A6%BC.png" alt="긴꼬리딱새">
        </div>

        <!-- 팝업창 -->
        <div id="name-popup">
            <div class="close-btn" onclick="hideNamePopup()">×</div>
            <div class="team-name">긴꼬리딱새조</div>
            <p class="member-names">정유진 · 박지혜 · 김유진<br>이다빈 · 허준성</p>
        </div>
    </div>

    <!-- 카카오맵 API -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4943ba2fc6952cf2d1e6afe9d646d32d"></script>
    <script>
        var mapContainer = document.getElementById('map'), 
            mapOption = { 
                center: new kakao.maps.LatLng(37.596957, 127.051758), 
                level: 3 
            };
        var map = new kakao.maps.Map(mapContainer, mapOption);

        // 팝업 함수
        function showNamePopup() { document.getElementById('name-popup').style.display = 'block'; }
        function hideNamePopup() { document.getElementById('name-popup').style.display = 'none'; }
    </script>

</body>
</html>
